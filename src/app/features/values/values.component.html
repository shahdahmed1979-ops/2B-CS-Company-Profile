<section class="values" id="values">
  <div class="container">
    <div class="values-head">
      <div class="sec-tag">Our Principles</div>
      <div class="sec-line"></div>
      <h2 class="sec-h">Our <span>Values</span></h2>
      <p class="sec-sub">The principles that drive everything we build and every partnership we form.</p>
    </div>

    <div class="values-grid">
      @for (v of values; track v.title; let i = $index) {
        <div class="val-card">
          <div class="val-ico">
            @switch (v.icon) {
              @case ('eye') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="2"/><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"/>
                </svg>
              }
              @case ('target') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
                </svg>
              }
              @case ('zap') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              }
              @case ('sparkle') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/>
                  <path d="M13 6h3a2 2 0 012 2v7M11 18H8a2 2 0 01-2-2V9"/>
                </svg>
              }
            }
          </div>
          <h3 class="val-title">{{ v.title }}</h3>
          <p class="val-text">{{ v.text }}</p>
        </div>
      }
    </div>
  </div>
</section>
