<footer class="footer">

    <div class="foot-grid">

          <a href="#" class="soc-btn" aria-label="Twitter / X" target="_blank" rel="noopener">

          </a>
          <a href="#" class="soc-btn" aria-label="Instagram" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>

      <!-- Quick Links -->

        <h4 class="foot-col-title">Quick Links</h4>
        <ul class="foot-list">
          <li><button (click)="navigate('/')">Home</button></li>
          <li><button (click)="navigate('/about')">About Us</button></li>
          <li><button (click)="navigate('/about')">Our Values</button></li>
          <li><button (click)="navigate('/services')">Services</button></li>
          <li><button (click)="navigate('/projects')">Projects</button></li>
          <li><button (click)="navigate('/contact')">Contact Us</button></li>
        </ul>
      </div>

      <!-- Services Links -->
      <div class="foot-col">
        <h4 class="foot-col-title">Our Services</h4>
        <ul class="foot-list">
          <li><button (click)="navigate('/services')">ERP Systems</button></li>
          <li><button (click)="navigate('/services')">NAS HR Software</button></li>
          <li><button (click)="navigate('/services')">Web Development</button></li>
          <li><button (click)="navigate('/services')">Mobile App Development</button></li>
        </ul>
      </div>

      <!-- Contact Info -->
      <div class="foot-col">
        <h4 class="foot-col-title">Get In Touch</h4>
        <div class="foot-contact">
          <div class="fci">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>

            <span>info&#64;2bcloudsolutions.com</span>
          </div>
        </div>

    </div>

    <!-- Bottom bar -->
    <div class="foot-bottom">
      <p class="copy">&copy; {{ year }} 2B Cloud Solutions. All rights reserved.</p>
      <div class="foot-legal">
        <a href="#" class="legal-link">Privacy Policy</a>
        <span class="legal-sep">·</span>
        <a href="#" class="legal-link">Terms &amp; Conditions</a>
      </div>
    </div>

  </div>
</footer>
